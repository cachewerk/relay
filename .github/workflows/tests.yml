name: Tests

on:
  pull_request: null
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  benchmarks:

    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: redis, relay
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Test benchmarks
        run: composer run bench -- --runs=1

  laravel:

    name: Laravel ${{ matrix.laravel }} (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: true
      matrix:
        include:
          - laravel: '11'
            php: '8.2'
          - laravel: '12'
            php: '8.2'
          - laravel: '13'
            php: '8.3'

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: redis, relay
          tools: composer
          coverage: none

      - name: Create Laravel app
        run: composer create-project laravel/laravel example-app "^${{ matrix.laravel }}.0" --no-interaction --prefer-dist

      - name: Install Composer dependencies
        working-directory: example-app
        run: |
          composer config repositories.cachewerk/relay path ${{ github.workspace }}
          composer require cachewerk/relay @dev --no-interaction

      - name: Install Relay verification fixtures
        working-directory: example-app
        run: |
          mkdir -p app/Console/Commands app/Jobs
          cp ${{ github.workspace }}/tests/laravel/VerifyRelay.php app/Console/Commands/VerifyRelay.php
          cp ${{ github.workspace }}/tests/laravel/NoopJob.php app/Jobs/NoopJob.php

      - name: Verify Relay (scan, queue, bulk)
        working-directory: example-app
        env:
          REDIS_CLIENT: relay
          QUEUE_CONNECTION: redis
        run: php artisan app:verify-relay

  laravel-cluster:

    name: Laravel ${{ matrix.laravel }} Cluster (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: true
      matrix:
        include:
          - laravel: '13'
            php: '8.3'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: redis, relay
          tools: composer
          coverage: none

      - name: Start Redis Cluster
        run: |
          sudo apt-get install -y redis-server >/dev/null
          for port in 7000 7001 7002 7003 7004 7005; do
            mkdir -p /tmp/redis-cluster/$port
            redis-server --port $port --cluster-enabled yes \
              --cluster-config-file /tmp/redis-cluster/$port/nodes.conf \
              --dir /tmp/redis-cluster/$port --appendonly no --save '' --daemonize yes
          done
          redis-cli --cluster create \
            127.0.0.1:7000 127.0.0.1:7001 127.0.0.1:7002 \
            127.0.0.1:7003 127.0.0.1:7004 127.0.0.1:7005 \
            --cluster-replicas 1 --cluster-yes
          for i in $(seq 1 30); do
            [ "$(redis-cli -p 7000 cluster info | grep -o 'cluster_state:ok')" = "cluster_state:ok" ] && break
            sleep 1
          done
          redis-cli -p 7000 cluster info | head -1

      - name: Create Laravel app
        run: composer create-project laravel/laravel example-app "^${{ matrix.laravel }}.0" --no-interaction --prefer-dist

      - name: Install Composer dependencies
        working-directory: example-app
        run: |
          composer config repositories.cachewerk/relay path ${{ github.workspace }}
          composer require cachewerk/relay @dev --no-interaction

      - name: Install Relay verification fixtures
        working-directory: example-app
        run: |
          mkdir -p app/Console/Commands app/Jobs app/Providers
          cp ${{ github.workspace }}/tests/laravel/VerifyRelay.php app/Console/Commands/VerifyRelay.php
          cp ${{ github.workspace }}/tests/laravel/NoopJob.php app/Jobs/NoopJob.php
          cp ${{ github.workspace }}/tests/laravel/RelayClusterTestProvider.php app/Providers/RelayClusterTestProvider.php
          php -r '$f = "bootstrap/providers.php"; file_put_contents($f, str_replace("    AppServiceProvider::class,", "    AppServiceProvider::class,\n    \\App\\Providers\\RelayClusterTestProvider::class,", file_get_contents($f)));'

      - name: Verify Relay over cluster (scan, queue, bulk, hash tags)
        working-directory: example-app
        env:
          REDIS_CLIENT: relay
          QUEUE_CONNECTION: redis
          REDIS_QUEUE_CONNECTION: relaycluster
          REDIS_CLUSTER_PORT: '7000'
        run: php artisan app:verify-relay --connection=relaycluster
