name: Tests

on:
  pull_request: null
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  benchmarks:

    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: redis, relay
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Test benchmarks
        run: composer run bench -- --runs=1

  laravel:

    name: Laravel ${{ matrix.laravel }} (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: true
      matrix:
        include:
          - laravel: '11'
            php: '8.2'
          - laravel: '12'
            php: '8.2'
          - laravel: '13'
            php: '8.5'

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: redis, relay
          tools: composer
          coverage: none

      - name: Create Laravel app
        run: composer create-project laravel/laravel example-app "^${{ matrix.laravel }}.0" --no-interaction --prefer-dist

      - name: Install Composer dependencies
        working-directory: example-app
        run: |
          composer config repositories.cachewerk/relay path ${{ github.workspace }}
          composer require cachewerk/relay @dev --no-interaction

      - name: Install Relay verification fixtures
        working-directory: example-app
        run: |
          mkdir -p app/Console/Commands app/Jobs
          cp ${{ github.workspace }}/tests/laravel/VerifyRelay.php app/Console/Commands/VerifyRelay.php
          cp ${{ github.workspace }}/tests/laravel/NoopJob.php app/Jobs/NoopJob.php

      - name: Verify Relay (scan, queue, bulk)
        working-directory: example-app
        env:
          REDIS_CLIENT: relay
          QUEUE_CONNECTION: redis
        run: php artisan app:verify-relay
